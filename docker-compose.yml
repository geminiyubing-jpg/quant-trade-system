version: '3.8'

services:
  # ==============================================
  # PostgreSQL 数据库
  # ==============================================
  postgres:
    image: postgres:15-alpine
    container_name: quant-trade-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quant_trade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quant_trade_pass}
      POSTGRES_DB: ${POSTGRES_DB:-quant_trade}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quant_trade}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quant-network

  # ==============================================
  # Redis 缓存
  # ==============================================
  redis:
    image: redis:7-alpine
    container_name: quant-trade-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quant-network

  # ==============================================
  # RabbitMQ 消息队列
  # ==============================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: quant-trade-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "15672:15672"  # 管理界面
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quant-network

  # ==============================================
  # 后端 API 服务
  # ==============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quant-trade-backend
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:-development}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-quant_trade}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-quant_trade_pass}
      - POSTGRES_DB=${POSTGRES_DB:-quant_trade}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - quant-network

  # ==============================================
  # Celery Worker
  # ==============================================
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quant-trade-celery-worker
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:-development}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-quant_trade}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-quant_trade_pass}
      - POSTGRES_DB=${POSTGRES_DB:-quant_trade}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs
    depends_on:
      - postgres
      - redis
      - rabbitmq
    command: celery -A src.tasks.celery_app worker --loglevel=info --concurrency=4
    networks:
      - quant-network

  # ==============================================
  # Celery Beat (定时任务)
  # ==============================================
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quant-trade-celery-beat
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:-development}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-quant_trade}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-quant_trade_pass}
      - POSTGRES_DB=${POSTGRES_DB:-quant_trade}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
    volumes:
      - ./backend:/app
      - celerybeat_data:/app/celerybeat
    depends_on:
      - postgres
      - redis
      - rabbitmq
    command: celery -A src.tasks.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    networks:
      - quant-network

  # ==============================================
  # 前端应用
  # ==============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quant-trade-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - REACT_APP_API_URL=http://localhost:${BACKEND_PORT:-8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm start
    networks:
      - quant-network

  # ==============================================
  # Prometheus 监控
  # ==============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: quant-trade-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - quant-network

  # ==============================================
  # Grafana 可视化
  # ==============================================
  grafana:
    image: grafana/grafana:latest
    container_name: quant-trade-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    networks:
      - quant-network

# ==============================================
# 数据卷
# ==============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  backend_logs:
    driver: local
  celerybeat_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ==============================================
# 网络
# ==============================================
networks:
  quant-network:
    driver: bridge
